name: Process Plaud Recordings

on:
  schedule:
    # 15分ごとに実行（録音終了後なるべく早く Discord へ）
    # GitHub Actions cron の最短は 5 分。実行遅延は通常 0〜5 分、高負荷時は 30 分程度になる場合あり
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 手動実行も可能

# 同時実行を抑止（processed_ids.json のコミット競合を防ぐ）
concurrency:
  group: process-plaud-recordings
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run auto processing
        env:
          PLAUD_API_DOMAIN: ${{ secrets.PLAUD_API_DOMAIN }}
          PLAUD_BEARER_TOKEN: ${{ secrets.PLAUD_BEARER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python plaud_to_discord.py auto

      - name: Commit processed IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_ids.json processed_hashes.json transcripts/
          git diff --cached --quiet || git commit -m "Update processed recordings [skip ci]"
          git push
