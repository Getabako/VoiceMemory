name: Process Plaud Recordings

on:
  schedule:
    # 15分ごとに実行（録音終了後なるべく早く Discord へ）
    # GitHub Actions cron の最短は 5 分。実行遅延は通常 0〜5 分、高負荷時は 30 分程度になる場合あり
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 手動実行も可能

# 同時実行を抑止（processed_ids.json のコミット競合を防ぐ）
concurrency:
  group: process-plaud-recordings
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    # 1ファイル処理ごとに即コミット&プッシュするため、タイムアウトしても完了分は保存される。
    # 50分に設定し、余裕を持たせる。
    timeout-minutes: 50

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Python スクリプト内から git push するため、認証情報を保持する
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure git for in-script commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run auto processing
        env:
          PLAUD_API_DOMAIN: ${{ secrets.PLAUD_API_DOMAIN }}
          PLAUD_BEARER_TOKEN: ${{ secrets.PLAUD_BEARER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          PYTHONUNBUFFERED: "1"
        # 1ファイル完了ごとにスクリプト内で commit&push するため、外側に Commit ステップは不要
        run: python -u plaud_to_discord.py auto

      - name: Commit any remaining state
        if: always()
        run: |
          git add processed_ids.json processed_hashes.json processed_audio_hashes.json transcripts/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update processed recordings [skip ci]"
          git pull --rebase origin main || true
          git push || true
